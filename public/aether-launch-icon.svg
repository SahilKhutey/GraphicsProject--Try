  <rect width="128" height="128" rx="28" fill="#030712"/>
  <path d="M22 92C31 110 98 110 106 36" fill="none" stroke="url(#ring)" stroke-width="8" stroke-linecap="round" opacity=".88"/>
  <path d="M107 36l-2 22-18-13z" fill="#67e8f9"/>
  <circle cx="64" cy="64" r="36" fill="url(#core)" filter="url(#glow)"/>
  <path d="M32 65h64M64 28c11 10 16 22 16 36s-5 26-16 36M64 28C53 38 48 50 48 64s5 26 16 36" fill="none" stroke="#eef2ff" stroke-width="5" stroke-linecap="round" opacity=".88"/>
  <path d="M38 82c12 5 40 5 52-1M38 46c12-5 40-5 52 1" fill="none" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity=".8"/>
  <circle cx="92" cy="32" r="5" fill="#22c55e"/>
</svg>
