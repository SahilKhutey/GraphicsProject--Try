<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Aether Engine Launch Icon</title>
  <desc id="desc">A glowing procedural planet control icon for Aether Engine.</desc>
  <defs>
    <radialGradient id="core" cx="44%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="34%" stop-color="#a5b4fc"/>
      <stop offset="68%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="ring" x1="19" y1="18" x2="109" y2="110">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.47 0 0 0 0 1 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
